spring:
  application:
    name: GAME-SERVICE
  config:
    import: optional:configserver:http://localhost:8888

  output:
    ansi:
      enabled: always


  datasource:
    url: jdbc:postgresql://localhost:5432/Tournament_org
    username: postgres
    password: 915327
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8069

# Настройки логирования
debug: true

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: DEBUG
    com.deviky: DEBUG  # Логи для вашего пакета
    com.deviky.Game_Service.game_core.models: DEBUG
    com.deviky.Game_Service.game_core.services: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"