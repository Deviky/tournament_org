      APP_EUREKA_DEFAULT_ZONE: http://discovery:8761/eureka
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://discovery:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: participant-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/Tournament_org
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 915327
      SPRING_REDIS_HOST: host.docker.internal
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: 915327

  tournament-service:
